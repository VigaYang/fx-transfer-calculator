<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX Transfer Profit Calculator</title>
    <link rel="stylesheet" href="style.css">

    <!-- Load ECharts locally -->
    <script src="echarts.min.js"></script>
</head>

<body>
    <div class="page">
        <h1>FX Transfer Profit Calculator</h1>
        <p class="subtitle">
            Compare whether transferring money between countries is profitable after FX, fees, and interest.
        </p>

        <div class="input-panel">

            <label>From Country:
                <input id="from_country" type="text" value="From Country">
            </label>

            <label>To Country:
                <input id="to_country" type="text" value="To Country">
            </label>

            <label>FX Rate (From currency per 1 To currency):
                <input id="fx_rate" type="number" step="0.01" value="9.2">
            </label>

            <label>From Country Interest Rate:
                <input id="from_interest" type="number" step="0.001" value="0.005">
            </label>

            <label>To Country Interest Rate:
                <input id="to_interest" type="number" step="0.001" value="0.038">
            </label>

            <label>Service Charge Rate:
                <input id="service_rate" type="number" step="0.001" value="0.001">
            </label>

            <label>Min Service Fee:
                <input id="min_cap" type="number" value="50">
            </label>

            <label>Max Service Fee:
                <input id="max_cap" type="number" value="260">
            </label>

            <label>Fixed Transfer Fee (From currency):
                <input id="fixed_fee" type="number" value="150">
            </label>

            <label>Receiving Bank Fee (To currency):
                <input id="to_fee" type="number" value="20">
            </label>

            <label>Max Amount (To currency):
                <input id="max_amount" type="number" value="100000">
            </label>

            <label>X Tick Step:
                <input id="x_tick_step" type="number" value="5000">
            </label>

            <label>Target Amount (To currency):
                <input id="target_amount" type="number" value="20000">
            </label>

            <button id="updateBtn">Update Chart</button>

        </div>

        <div id="chart" class="chart"></div>
    </div>

    <!-- Your main logic -->
    <script src="script.js"></script>
</body>
</html>
