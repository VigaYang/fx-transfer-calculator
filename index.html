<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GBP Transfer Profit Calculator</title>
    <link rel="stylesheet" href="style.css">

    <!-- ECharts (China-friendly CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
</head>

<body>
    <h1>GBP Transfer Profit Calculator</h1>

    <div class="input-panel">
        <label>FX Rate (CNY per GBP): <input id="fx_rate" type="number" step="0.01" value="9.2"></label>
        <label>China Interest Rate: <input id="china_interest" type="number" step="0.001" value="0.005"></label>
        <label>UK Interest Rate: <input id="uk_interest" type="number" step="0.001" value="0.038"></label>
        <label>Service Charge Rate: <input id="service_rate" type="number" step="0.001" value="0.001"></label>
        <label>Min Cap (RMB): <input id="min_cap" type="number" value="50"></label>
        <label>Max Cap (RMB): <input id="max_cap" type="number" value="260"></label>
        <label>UK Fee (GBP): <input id="uk_fee" type="number" value="20"></label>

        <button onclick="updateChart()">Update Chart</button>
    </div>

    <div id="chart" style="width: 100%; height: 500px;"></div>

    <script src="script.js"></script>
</body>
</html>
